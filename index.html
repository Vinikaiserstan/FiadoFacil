<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiadoFácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="not-logged-in">

    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-rocket"></i></div>
            <h2 id="auth-title">FiadoFácil</h2>
            <p>Sua gestão financeira simplificada</p>
            <div class="auth-form">
                <input type="email" id="auth-email" placeholder="E-mail">
                <input type="password" id="auth-senha" placeholder="Senha">
                <button onclick="window.fazerLogin()" class="btn-primary" id="btn-auth">Entrar no Sistema</button>
            </div>
            <div class="auth-footer">
                <span>Novo por aqui? <a href="#" onclick="window.toggleAuthMode()">Criar conta</a></span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area"><i class="fas fa-robot"></i> <span class="nav-text">FiadoFácil</span></div>
            <nav>
                <button onclick="window.navegar('home')"><i class="fas fa-home"></i> <span class="nav-text">Home</span></button>
                <button onclick="window.navegar('cliente')"><i class="fas fa-user-plus"></i> <span class="nav-text">Clientes</span></button>
                <button onclick="window.navegar('venda')"><i class="fas fa-cart-plus"></i> <span class="nav-text">Nova Venda</span></button>
                <button onclick="window.navegar('historico')"><i class="fas fa-receipt"></i> <span class="nav-text">Cobranças</span></button>
                <button onclick="window.fazerLogout()" class="logout-btn"><i class="fas fa-power-off"></i> <span class="nav-text">Sair</span></button>
            </nav>
        </aside>

        <div class="fab-container" id="fab-menu">
            <div class="fab-options">
                <button onclick="window.navegarFab('historico')" title="Cobranças"><i class="fas fa-receipt"></i></button>
                <button onclick="window.navegarFab('venda')" title="Nova Venda"><i class="fas fa-cart-plus"></i></button>
                <button onclick="window.navegarFab('cliente')" title="Novo Cliente"><i class="fas fa-user-plus"></i></button>
                <button onclick="window.navegarFab('home')" title="Home"><i class="fas fa-home"></i></button>
            </div>
            <button class="fab-main" onclick="window.toggleFab()"><i class="fas fa-plus"></i></button>
        </div>

        <main class="main-content">
            <section id="tela-home" class="tela">
                <div class="welcome-header">
                    <h2>Resumo Financeiro</h2>
                    <p>Controle de vendas e recebimentos</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card card-fiado">
                        <i class="fas fa-hand-holding-dollar"></i>
                        <span>A Receber (Fiado)</span>
                        <h2 id="total-geral">R$ 0,00</h2>
                    </div>
                    <div class="stat-card card-recebido">
                        <i class="fas fa-circle-check"></i>
                        <span>Total Recebido</span>
                        <h2 id="total-pago">R$ 0,00</h2>
                    </div>
                </div>
            </section>

            <section id="tela-cliente" class="tela">
                <div class="centered-form">
                    <form id="form-cliente" class="form-box">
                        <h2>Novo Cliente</h2>
                        <input type="text" id="nome-cliente" placeholder="Nome Completo" required>
                        <input type="tel" id="tel-cliente" placeholder="WhatsApp (DDD + Número)" required>
                        <button type="submit" class="btn-primary">Salvar Cliente</button>
                    </form>
                </div>
            </section>

            <section id="tela-venda" class="tela">
                <div class="centered-form">
                    <form id="form-venda" class="form-box">
                        <h2>Lançar Venda</h2>
                        <label>Cliente</label>
                        <select id="select-cliente" required></select>
                        <label>Valor</label>
                        <input type="text" id="valor-venda" placeholder="R$ 0,00" required>
                        <label>Descrição</label>
                        <input type="text" id="desc-venda" placeholder="Ex: Serviços">
                        <div class="form-row">
                            <div class="col">
                                <label>Parcelas</label>
                                <select id="parcelas-venda">
                                    <option value="1">À Vista</option>
                                    <option value="2">2x</option>
                                    <option value="3">3x</option>
                                    <option value="6">6x</option>
                                </select>
                            </div>
                            <div class="col">
                                <label>Vencimento</label>
                                <input type="date" id="vencimento-venda" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Confirmar Venda</button>
                    </form>
                </div>
            </section>

            <section id="tela-historico" class="tela">
                <div class="filter-bar">
                    <button class="active" onclick="window.mudarFiltro('todos', this)">Todas</button>
                    <button onclick="window.mudarFiltro('pendente', this)">Pendentes</button>
                    <button onclick="window.mudarFiltro('pago', this)">Pagas</button>
                </div>
                <div id="lista-historico" class="cards-list"></div>
            </section>
        </main>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="window.fecharModal('modal-edit')">&times;</span>
            <h3>Editar Registro</h3>
            <label>Descrição</label><input type="text" id="edit-desc">
            <label>Valor</label><input type="number" step="0.01" id="edit-valor">
            <button onclick="window.salvarEdicao()" class="btn-primary">Salvar Alterações</button>
            <button onclick="window.apagarVenda()" class="btn-danger-text">Excluir Cobrança</button>
        </div>
    </div>

    <div id="modal-lembrete" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="window.fecharModal('modal-lembrete')">&times;</span>
            <h3>Enviar Lembrete</h3>
            <p>Edite a mensagem para o cliente:</p>
            <textarea id="msg-whatsapp" rows="5"></textarea>
            <button onclick="window.enviarWpp()" class="btn-primary btn-wpp-action">
                <i class="fab fa-whatsapp"></i> Abrir WhatsApp
            </button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
